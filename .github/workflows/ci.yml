name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: ruff check
        working-directory: tools/open-spyro
        run: uv run ruff check .

      - name: ruff format --check
        working-directory: tools/open-spyro
        run: uv run ruff format --check .

      - name: ty check
        working-directory: tools/open-spyro
        run: uv run ty check

      - name: clang-format check (C)
        run: uv run --project tools/open-spyro -- clang-format --dry-run --Werror src/c/*.c

  build-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need base branch to compute the PR progress delta

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Matching Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: tools
          file: tools/Dockerfile
          tags: open-spyro/matchenv:latest
          load: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + verify + progress
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            open-spyro/matchenv:latest bash tools/ci.sh

      # ---- PR: Comment the delta ----------
      - name: Compute progress delta vs base
        if: github.event_name == 'pull_request'
        id: delta
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # progress.json is a gitignored build artifact (not committed), so the
          # base numbers come from the base branch's tracked PROGRESS.md headline.
          git show "origin/${BASE_REF}:PROGRESS.md" > /tmp/base_progress.md 2>/dev/null \
            || : > /tmp/base_progress.md
          uv run --project tools/open-spyro -- open-spyro progress-delta \
            --base-ref "$BASE_REF" \
            --head-json progress.json \
            --base-md /tmp/base_progress.md > /tmp/body.md
          {
            echo "body<<DELTA_EOF"
            cat /tmp/body.md
            echo "DELTA_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment progress delta
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          BODY: ${{ steps.delta.outputs.body }}
        with:
          script: |
            const marker = '<!-- open-spyro-progress -->';
            const body = `${marker}\n${process.env.BODY}`;
            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;
            const {data: comments} = await github.rest.issues.listComments({owner, repo, issue_number});
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
            }
